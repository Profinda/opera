Style/MethodCalledOnDoEndBlock:
  Enabled: false

Style/MethodDefParentheses:
  Enabled: false

Style/MinMax:
  Enabled: false

Style/MinMaxComparison:
  Enabled: false

Style/MissingElse:
  Enabled: false

Style/MixinGrouping:
  Enabled: true
